services:
  trackerview:
    image: trackerview:${TRACKERVIEW_VERSION:-latest}
    platform: linux/amd64
    container_name: trackerview
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_VERSION: ${TRACKERVIEW_VERSION:-}
      TRACKERVIEW_CONFIG_PATH: /app/config.toml
      TRACKER_USERNAME: ${TRACKER_USERNAME}
      TRACKER_PASSWORD: ${TRACKER_PASSWORD}
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./data:/app/data
      - /volume1/Downloads/data:/volume1/Downloads/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
