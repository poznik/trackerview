<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web UI Template</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-brand">
        <h1 id="app-title">Web UI Template</h1>
        <span id="app-version" class="version-tag">0.0.0</span>
      </div>
      <div class="topbar-actions">
        <span id="auth-user" class="auth-user hidden"></span>
        <button id="update-btn" type="button" class="ghost-btn">Обновить</button>
        <button id="logout-btn" type="button" class="ghost-btn hidden">Выйти</button>
      </div>
    </header>

    <p id="update-status" class="banner banner-update hidden"></p>

    <main id="app-content" class="app-content">
      <div class="toolbar">
        <form id="load-form" class="toolbar-form" autocomplete="off">
          <div class="source-group">
            <input
              id="source-query"
              name="source-query"
              type="text"
              placeholder="Ссылка или текст запроса"
              autocomplete="off"
            />
            <select id="saved-views" name="saved-views" title="Сохраненные виды">
              <option value="">Сохраненное</option>
              <option value="favorites">Избранные теги</option>
              <option value="recent">Недавние</option>
            </select>
          </div>
          <input
            id="max-items"
            name="max-items"
            type="number"
            min="1"
            value="80"
            title="Лимит"
            aria-label="Лимит"
          />
          <button id="load-btn" type="submit" class="primary-btn">Загрузить</button>
          <button id="save-view-btn" type="button" class="icon-btn" title="Сохранить вид" aria-label="Сохранить вид">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M4 3h13l3 3v15H4V3zm2 2v14h12V7.2L16.2 5H6zm2 0h7v4H8V5zm0 8h8v6H8v-6z"></path>
            </svg>
          </button>
        </form>
        <div class="toolbar-extra">
          <button id="sort-date-btn" type="button" class="ghost-btn" aria-label="Переключить сортировку">
            <span class="sort-label">Дата</span>
            <span id="sort-arrow" class="sort-arrow">↓</span>
          </button>
          <button
            id="filters-toggle"
            type="button"
            class="ghost-btn"
            aria-expanded="false"
            aria-controls="filters-drawer"
          >
            Фильтры
          </button>
        </div>
      </div>

      <div id="filters-drawer" class="filters-drawer" hidden>
        <div class="filters-column">
          <section class="filters-section">
            <p class="filters-section-title">Теги</p>
            <input
              id="tag-filter-search"
              class="filter-search-input"
              type="search"
              placeholder="Поиск по тегам"
              autocomplete="off"
            />
            <div id="tag-filters" class="chip-group"></div>
          </section>
          <section class="filters-section">
            <p class="filters-section-title">Состояние</p>
            <div id="state-filters" class="chip-group"></div>
          </section>
        </div>
        <section class="filters-section">
          <p class="filters-section-title">Категории</p>
          <div id="category-filters" class="chip-group"></div>
        </section>
      </div>

      <div class="status-bar">
        <p id="status" class="status-text">Ожидание</p>
        <p id="progress-counter" class="progress-text">0 / 0</p>
        <p id="summary" class="summary-text"></p>
      </div>

      <div id="item-feed" class="item-feed" role="feed"></div>
    </main>

    <aside id="detail-drawer" class="detail-drawer" hidden aria-hidden="true">
      <div class="drawer-backdrop" id="drawer-backdrop"></div>
      <div class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="drawer-title" tabindex="-1">
        <button type="button" id="drawer-close" class="drawer-close" aria-label="Закрыть">×</button>
        <div id="drawer-content" class="drawer-content"></div>
      </div>
    </aside>

    <div id="hover-preview" class="hover-preview" hidden>
      <img id="hover-preview-image" alt="" />
    </div>

    <script src="./app.js"></script>
  </body>
</html>
